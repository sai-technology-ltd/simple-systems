name: Backend CI/CD

concurrency:
  group: api-cd-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/api-cd.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-cd.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '8.15.1'

jobs:
  test:
    name: Backend Build + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: simple_systems
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d simple_systems"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      PORT: 3000
      BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simple_systems?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/simple_systems?schema=public
      TOKEN_ENC_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NOTION_CLIENT_ID: dummy
      NOTION_CLIENT_SECRET: dummy
      NOTION_REDIRECT_URI: http://localhost:3000/notion/oauth/callback
      NOTION_VERSION: '2022-06-28'
      POSTMARK_SERVER_TOKEN: dummy
      ADMIN_API_KEY: dummy
      OAUTH_STATE_SECRET: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm prisma migrate deploy
      - run: pnpm build
      - run: pnpm test:cov
      - run: pnpm test:e2e --runInBand

  docker:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
      name: Trigger Coolify Deploy
      runs-on: ubuntu-latest
      needs: docker
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      steps:
        - name: Trigger Coolify deploy API
          env:
            COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
            COOLIFY_UUID_API: ${{ secrets.COOLIFY_UUID_API }}
            COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          run: |
            set -euo pipefail
            if [ -z "${COOLIFY_URL:-}" ] || [ -z "${COOLIFY_UUID_API:-}" ]; then
              echo "Missing required secrets: COOLIFY_URL and/or COOLIFY_UUID_API"
              exit 1
            fi

            DEPLOY_ENDPOINT="${COOLIFY_URL}?uuid=${COOLIFY_UUID_API}&force=true"
            echo "Triggering Coolify deploy..."

            if [ -n "${COOLIFY_TOKEN:-}" ]; then
              curl --fail --show-error --silent -X POST "$DEPLOY_ENDPOINT" \
                -H "Authorization: Bearer ${COOLIFY_TOKEN}"
            else
              curl --fail --show-error --silent -X POST "$DEPLOY_ENDPOINT"
            fi

            echo "Coolify deploy trigger sent successfully."

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs:
      - test
      - docker
      - deploy
    if: always()
    steps:
      - name: Send workflow status to Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          TEST_RESULT: ${{ needs.test.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_REPOSITORY: ${{ secrets.REGISTRY_REPOSITORY }}
        run: |
          set -euo pipefail

          overall_status="success"
          color="#2eb886"

          for result in "$TEST_RESULT" "$DOCKER_RESULT" "$DEPLOY_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              overall_status="$result"
              color="#e01e5a"
              break
            fi
          done

          if [ "$overall_status" = "success" ] && \
             { [ "$TEST_RESULT" = "skipped" ] || [ "$DOCKER_RESULT" = "skipped" ] || [ "$DEPLOY_RESULT" = "skipped" ]; }; then
            color="#ecb22e"
          fi

          short_sha=$(printf '%s' "$SHA" | cut -c1-7)
          run_url="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
          image_ref=""

          if [ -n "${REGISTRY_HOST:-}" ] && [ -n "${REGISTRY_REPOSITORY:-}" ]; then
            image_ref="${REGISTRY_HOST}/${REGISTRY_REPOSITORY}"
          fi

          payload=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "${color}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${WORKFLOW_NAME}: ${overall_status}"
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Repository:*\n${REPOSITORY}" },
                      { "type": "mrkdwn", "text": "*Event:*\n${EVENT_NAME}" },
                      { "type": "mrkdwn", "text": "*Branch:*\n${REF_NAME}" },
                      { "type": "mrkdwn", "text": "*Actor:*\n${ACTOR}" },
                      { "type": "mrkdwn", "text": "*Commit:*\n\`${short_sha}\`" },
                      { "type": "mrkdwn", "text": "*Run Attempt:*\n${RUN_ATTEMPT}" }
                    ]
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Test Job:*\n${TEST_RESULT}" },
                      { "type": "mrkdwn", "text": "*Docker Job:*\n${DOCKER_RESULT}" },
                      { "type": "mrkdwn", "text": "*Deploy Job:*\n${DEPLOY_RESULT}" },
                      { "type": "mrkdwn", "text": "*Image:*\n${image_ref:-n/a}" }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Run URL:*\n${run_url}"
                    }
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-Type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
